<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>表情包可爱风格网页</title>
    <!-- 漫画风格字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <!-- 引入样式表 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="gallery">
        <!-- 第一张照片及对话泡泡 -->
        <div class="photo-box" id="photo1">
            <img src="type c.jpg" alt="Type C照片">
            <div class="speech-bubble">type c 😂</div>
        </div>
        <!-- 第二张照片及心形装饰 -->
        <div class="photo-box" id="photo2">
            <img src="嘟嘟.jpg" alt="嘟嘟照片">
            <div class="heart">❤</div>
        </div>
    </div>
    <!-- 引入脚本 -->
    <script src="script.js"></script>
</body>
</html>
